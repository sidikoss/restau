<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="icon-192.svg" type="image/svg+xml">
    <meta name="theme-color" content="#e63946">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <title>404 - Page non trouvée | Heros Cafe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary: #e63946; --secondary: #ffb703; --dark: #0d1b2a; --light: #f1faee; }
        [data-theme="light"] body { background: #0d1b2a; color: white; }
        [data-theme="dark"] body { background: var(--dark); color: white; }
        body { font-family: 'Poppins', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 20px; background: #0d1b2a; color: white; }
        .container { max-width: 600px; }
        h1 { font-family: 'Bebas Neue', sans-serif; font-size: 10rem; line-height: 1; color: var(--primary); text-shadow: 0 10px 40px rgba(230,57,70,0.3); }
        .page-icon { width: 92px; height: 92px; border-radius: 8px; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; font-size: 3rem; animation: bounce 2s infinite; }
        @keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        h2 { font-family: 'Bebas Neue', sans-serif; font-size: 2.5rem; margin-bottom: 15px; letter-spacing: 0; }
        h2 span { color: var(--secondary); }
        p { color: rgba(255,255,255,0.7); margin-bottom: 30px; font-size: 1.1rem; }
        .btn {
            display: inline-flex; align-items: center; gap: 10px;
            padding: 15px 35px; background: var(--primary); color: white;
            text-decoration: none; border-radius: 50px; font-weight: 600;
            transition: 0.3s; font-family: 'Poppins', sans-serif;
        }
        .btn:hover { background: var(--secondary); color: var(--dark); transform: translateY(-3px); }
    </style>
</head>
<body>
    <div class="container">
        <div class="page-icon"><i class="fas fa-burger" aria-hidden="true"></i></div>
        <h1>404</h1>
        <h2>PERDU, <span>HÉROS</span> ?</h2>
        <p>On dirait que cette page a été dévorée par un appétit féroce... Reviens à l'accueil pour trouver ton chemin !</p>
        <a href="index.html" class="btn"><i class="fas fa-home"></i> Retour à l'accueil</a>
    </div>
</body>
</html>
